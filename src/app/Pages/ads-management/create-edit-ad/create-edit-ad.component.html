<div class="w-full max-w-[520px]">
  <!-- HEADER -->
  <div
    class="flex justify-between items-center px-6 py-4 bg-[var(--primaryColor)] text-white rounded-t-xl"
  >
    <div>
      <div class="text-lg font-semibold">
        {{ isEdit ? "Edit Ad" : "Create Ad" }}
      </div>

      <p class="text-xs opacity-80">
        {{ isEdit ? "Update Ad Details" : "Add a new Ad for a client" }}
      </p>
    </div>

    <button
      (click)="close()"
      class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition"
    >
      <i class="fa-solid fa-x text-sm"></i>
    </button>
  </div>

  <!-- FORM BODY -->
  <div class="px-6 py-6 max-h-[65vh] overflow-y-auto space-y-5">
    <!-- ad -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Ad </label>

      <input
        type="text"
        [(ngModel)]="form.ad"
        placeholder="Enter Ad title"
        class="w-full h-10 px-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
      />
    </div>

    <!-- CLIENT -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Client </label>

      <mat-form-field appearance="outline" class="w-full text-sm">
        <input
          type="text"
          matInput
          placeholder="Search client"
          [(ngModel)]="clientSearch"
          [matAutocomplete]="clientAuto"
          (input)="filterClients()"
        />

        <mat-autocomplete
          #clientAuto="matAutocomplete"
          (optionSelected)="selectClient($event.option.value)"
        >
          <mat-option
            *ngFor="let client of filteredClients"
            [value]="client.name"
          >
            {{ client.name }}
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Start Date </label>
      <div class="flex gap-2 items-center">
        <input
          type="date"
          [(ngModel)]="form.startDate"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30 resize-none"
        />
        <span class="font-bold text-xl">-</span>
        <input
          type="date"
          [(ngModel)]="form.endDate"
          class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30 resize-none"
        />
      </div>
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Ad Link </label>

      <div class="relative">
        <input
          type="text"
          [(ngModel)]="form.link"
          placeholder="Paste your Ad link"
          class="w-full h-10 pl-10 pr-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
        />

        <i
          class="fa-solid fa-link absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
        ></i>
      </div>
    </div>

    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Amount </label>

      <input
        type="text"
        placeholder="Enter Amount"
        [(ngModel)]="form.amount"
        (ngModelChange)="validateAmt($event)"
        class="w-full h-10 px-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
      />
      <div *ngIf="AmtNumber" class="mt-1 text-sm text-red-500">
        {{ "Please enter a valid amount greater than 0" }}
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div
    class="flex justify-end gap-3 px-6 py-4 border-t bg-gray-50 rounded-b-xl"
  >
    <button
      (click)="close()"
      class="px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition"
    >
      Cancel
    </button>

    <button
      (click)="saveAd()"
      class="px-5 py-2 text-sm rounded-lg bg-[var(--primaryColor)] text-white font-medium shadow-sm hover:shadow-md hover:scale-[1.02] transition"
    >
      {{ isEdit ? "Save Changes" : "Create Ad" }}
    </button>
  </div>
</div>
