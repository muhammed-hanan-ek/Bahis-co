<div class="w-full max-w-[520px]">
  <!-- HEADER -->
  <div
    class="flex justify-between items-center px-6 py-4 bg-[var(--primaryColor)] text-white rounded-t-xl"
  >
    <div>
      <div class="text-lg font-semibold">
        {{ isEdit ? "Edit Work" : "Create Work" }}
      </div>

      <p class="text-xs opacity-80">
        {{
          isEdit
            ? "Update work information and permissions"
            : "Add a new work for a client"
        }}
      </p>
    </div>

    <button
      (click)="close()"
      class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition"
    >
      <i class="fa-solid fa-x text-sm"></i>
    </button>
  </div>

  <!-- BODY -->
  <div class="px-6 py-6 max-h-[65vh] overflow-y-auto space-y-5">
    <!-- TITLE -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Work Title </label>
      <input
        type="text"
        [(ngModel)]="form.title"
        placeholder="Enter work title"
        class="w-full h-10 px-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
      />
    </div>

    <!-- CLIENT -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Client </label>

      <mat-form-field appearance="outline" class="w-full text-sm">
        <input
          type="text"
          matInput
          placeholder="Search client"
          [(ngModel)]="clientSearch"
          [matAutocomplete]="clientAuto"
          (input)="filterClients()"
        />

        <mat-autocomplete
          #clientAuto="matAutocomplete"
          (optionSelected)="selectClient($event.option.value)"
        >
          <mat-option
            *ngFor="let client of filteredClients"
            [value]="client.Client"
          >
            {{ client.Client }}
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>
    </div>

    <!-- DESCRIPTION -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Description </label>
      <textarea
        rows="3"
        [(ngModel)]="form.description"
        placeholder="Write work details..."
        class="w-full px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30 resize-none"
      ></textarea>
    </div>

    <!-- DRIVE LINK -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-gray-600"> Drive Link </label>

      <div class="relative">
        <input
          type="text"
          [(ngModel)]="form.driveLink"
          placeholder="Paste Google Drive link"
          class="w-full h-10 pl-10 pr-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
        />

        <i
          class="fa-brands fa-google-drive absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
        ></i>
      </div>
    </div>

    <!-- WORK TAG + EMPLOYEE -->
    <div class="space-y-2">
      <div class="flex gap-3 items-center justify-between">
        <label class="text-sm font-medium text-gray-600">
          Work Tags & Employees
        </label>
        <button
          type="button"
          (click)="addAssignment()"
          class="flex items-center justify-center font-medium text-gray-600 bg-gray-50 py-1 px-3 rounded-lg hover:bg-gray-100 hover:text-gray-700 border gap-1 text-xs transition"
        >
          <i class="fa-solid fa-plus text-xs"></i>
          <span>Add Tag</span>
        </button>
      </div>

      <div
        *ngFor="let item of workAssignments; let i = index"
        class="flex items-center gap-2"
      >
        <!-- TAG -->
        <input
          type="text"
          [(ngModel)]="item.tag"
          placeholder="Enter tag (e.g. shoot)"
          class="w-1/4 h-14 px-3 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primaryColor)]/30"
        />

        <!-- EMPLOYEE -->
        <mat-form-field appearance="outline" class="w-3/4 text-sm">
          <input
            type="text"
            matInput
            placeholder="Search employee"
            [(ngModel)]="item.employeeSearch"
            [matAutocomplete]="empAuto"
            (input)="filterEmployees(i)"
          />

          <mat-autocomplete
            #empAuto="matAutocomplete"
            (optionSelected)="selectEmployee($event.option.value, i)"
          >
            <mat-option
              *ngFor="let emp of item.filteredEmployees"
              [value]="emp.name"
            >
              {{ emp.name }}
            </mat-option>
          </mat-autocomplete>
        </mat-form-field>

        <!-- ADD -->

        <!-- REMOVE -->
        <button
          *ngIf="workAssignments.length > 1"
          type="button"
          (click)="removeAssignment(i)"
          class="text-red-500 hover:text-red-700 hover:shadow-none flex items-center justify-center transition"
        >
          <i class="fa-solid fa-trash text-xs"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div
    class="flex justify-end gap-3 px-6 py-4 border-t bg-gray-50 rounded-b-xl"
  >
    <button
      (click)="close()"
      class="px-4 py-2 text-sm rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition"
    >
      Cancel
    </button>

    <button
      (click)="savework()"
      [disabled]="
        !form.title || !form.description || !form.client || !form.driveLink
      "
      class="px-5 py-2 text-sm rounded-lg bg-[var(--primaryColor)] text-white disabled:opacity-70 font-medium shadow-sm hover:shadow-md hover:scale-[1.02] transition"
    >
      {{ isEdit ? "Save Changes" : "Create Work" }}
    </button>
  </div>
</div>
