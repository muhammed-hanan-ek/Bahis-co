<div
  *ngIf="config$ | async as config"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[9999]"
>
  <div
    class="bg-white rounded-2xl shadow-2xl border border-gray-100 w-[380px] p-7 transform transition-all"
  >
    <!-- ICON -->
    <div class="flex justify-center mb-5">
      <div
        class="w-14 h-14 flex items-center justify-center rounded-full shadow-sm"
        [ngClass]="{
          'bg-red-50 text-red-600': config.type === 'danger',
          'bg-green-50 text-green-600': config.type === 'success',
          'bg-blue-50 text-blue-600': config.type === 'info',
        }"
      >
        <i
          class="fa-solid text-lg"
          [ngClass]="{
            'fa-trash': config.type === 'danger',
            'fa-check': config.type === 'success',
            'fa-circle-info': config.type === 'info',
          }"
        ></i>
      </div>
    </div>

    <!-- TITLE -->
    <div class="text-lg font-semibold text-center text-gray-800 mb-1">
      {{ config.title }}
    </div>

    <!-- MESSAGE -->
    <div class="text-sm text-gray-500 text-center leading-relaxed mb-7">
      {{ config.message }}
    </div>

    <!-- BUTTONS -->
    <div class="flex gap-3">
      <button
        (click)="confirm.cancel()"
        class="flex-1 py-2.5 text-sm font-medium border border-gray-200 rounded-lg hover:bg-gray-50 transition"
      >
        {{ config.cancelText || "Cancel" }}
      </button>

      <button
        (click)="confirm.confirm()"
        class="flex-1 py-2.5 text-sm font-semibold text-white rounded-lg transition shadow-sm"
        [ngClass]="{
          'bg-red-600 hover:bg-red-700': config.type === 'danger',
          'bg-green-600 hover:bg-green-700': config.type === 'success',
          'bg-blue-600 hover:bg-blue-700': config.type === 'info',
        }"
      >
        {{ config.confirmText || "Confirm" }}
      </button>
    </div>
  </div>
</div>
